<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos del Mundo | cafes.uy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-card: #1c1c1c;
            --bg-elevated: #262626;
            --text-primary: #ffffff;
            --text-secondary: #a8a8a8;
            --text-muted: #737373;
            --border: #363636;
            --gradient-start: #833ab4;
            --gradient-mid: #fd1d1d;
            --gradient-end: #fcb045;
            --accent: #0095f6;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            padding: 0.875rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-actions a {
            color: var(--text-primary);
            font-size: 1.25rem;
            text-decoration: none;
        }

        .back-btn {
            font-size: 0.875rem !important;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        /* Page header */
        .page-header {
            padding: 1.5rem 1rem 0.5rem;
            text-align: center;
        }

        .page-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 0.8125rem;
        }

        /* Filters */
        .filters-section {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .filters {
            display: flex;
            gap: 0.5rem;
            padding: 0 1rem;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .filter-btn:hover {
            background: var(--bg-elevated);
        }

        .filter-btn.active {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        /* Results count */
        .results-count {
            padding: 1rem 1rem 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Cafes list */
        .cafes-list {
            padding: 0.5rem 0 5rem;
        }

        .cafe-card {
            background: var(--bg-primary);
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            cursor: pointer;
        }

        .cafe-card:hover {
            background: var(--bg-secondary);
        }

        .cafe-card:active {
            background: var(--bg-card);
        }

        .cafe-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .cafe-info {
            flex: 1;
            min-width: 0;
        }

        .cafe-name {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .cafe-city {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .cafe-city i {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .cafe-instagram {
            color: var(--accent);
            font-size: 0.8125rem;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            flex-shrink: 0;
        }

        .cafe-instagram:hover {
            text-decoration: underline;
        }

        .cafe-instagram i {
            font-size: 1rem;
        }

        .cafe-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-top: 0.625rem;
        }

        .tag {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            padding: 0.25rem 0.625rem;
            border-radius: 4px;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .tag.argentina {
            background: rgba(117, 170, 219, 0.15);
            color: #75aadb;
        }

        .tag.espana {
            background: rgba(255, 196, 0, 0.15);
            color: #ffc400;
        }

        .tag.brasil {
            background: rgba(0, 156, 59, 0.15);
            color: #00c853;
        }

        .tag.chile {
            background: rgba(213, 43, 30, 0.15);
            color: #ff6659;
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .no-results-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
            filter: grayscale(1);
        }

        .no-results p {
            font-size: 0.9375rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 640px) {
            .cafe-header {
                flex-direction: column;
                gap: 0.625rem;
            }

            .cafe-instagram {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">cafes.uy</a>
        <div class="header-actions">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>
    </header>

    <main>
        <section class="page-header">
            <h1>Favoritos del Mundo</h1>
            <p>Mis cafés favoritos fuera de Uruguay</p>
        </section>

        <section class="filters-section">
            <div class="filters">
                <button class="filter-btn" data-country="argentina">
                    Argentina
                </button>
                <button class="filter-btn" data-country="espana">
                    España
                </button>
                <button class="filter-btn" data-country="brasil">
                    Brasil
                </button>
                <button class="filter-btn" data-country="chile">
                    Chile
                </button>
            </div>
        </section>

        <div class="results-count" id="results-count"></div>

        <section class="cafes-list" id="cafes-list">
            <!-- Cafés se cargan dinámicamente -->
        </section>
    </main>

    <footer>
        <p>Hecho con cafe en Uruguay</p>
    </footer>

    <script>
        let allCafes = [];
        let activeCountry = null;

        // Cargar cafés del JSON
        async function loadCafes() {
            try {
                const response = await fetch('internacional.json');
                const data = await response.json();
                allCafes = data.coffee_shops;
                return allCafes;
            } catch (error) {
                console.error('Error cargando cafés:', error);
                document.getElementById('cafes-list').innerHTML = `
                    <div class="no-results">
                        <div class="no-results-emoji">:/</div>
                        <p>Error cargando los cafés</p>
                    </div>
                `;
                return [];
            }
        }

        // Renderizar cafés
        function renderCafes(cafes) {
            const container = document.getElementById('cafes-list');
            const countEl = document.getElementById('results-count');

            if (cafes.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-emoji">:/</div>
                        <p>No hay cafés agregados todavía</p>
                    </div>
                `;
                countEl.textContent = '0 cafés';
                return;
            }

            countEl.textContent = `${cafes.length} café${cafes.length !== 1 ? 's' : ''}`;

            container.innerHTML = cafes.map(cafe => `
                <div class="cafe-card" onclick="window.open('https://instagram.com/${cafe.instagram}', '_blank')">
                    <div class="cafe-header">
                        <div class="cafe-info">
                            <div class="cafe-name">${cafe.name}</div>
                            ${cafe.city ? `<div class="cafe-city"><i class="fas fa-location-dot"></i> ${cafe.city}</div>` : ''}
                        </div>
                        <a href="https://instagram.com/${cafe.instagram}" target="_blank" class="cafe-instagram" onclick="event.stopPropagation()">
                            <i class="fab fa-instagram"></i> @${cafe.instagram}
                        </a>
                    </div>
                    <div class="cafe-tags">
                        <span class="tag ${cafe.country}">${formatCountry(cafe.country)}</span>
                    </div>
                </div>
            `).join('');
        }

        // Formatear país para mostrar
        function formatCountry(country) {
            const countryNames = {
                'argentina': 'Argentina',
                'espana': 'España',
                'brasil': 'Brasil',
                'chile': 'Chile'
            };
            return countryNames[country] || country;
        }

        // Filtrar cafés
        function filterCafes() {
            if (!activeCountry) {
                renderCafes(allCafes);
                return;
            }

            const filtered = allCafes.filter(cafe => cafe.country === activeCountry);
            renderCafes(filtered);
        }

        // Setup filtros
        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const country = btn.dataset.country;

                    if (activeCountry === country) {
                        activeCountry = null;
                        btn.classList.remove('active');
                    } else {
                        filterBtns.forEach(b => b.classList.remove('active'));
                        activeCountry = country;
                        btn.classList.add('active');
                    }

                    filterCafes();
                });
            });
        }

        // Leer filtro de URL
        function getCountryFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('country');
        }

        // Activar filtro desde URL
        function activateFilterFromURL() {
            const country = getCountryFromURL();
            if (country) {
                const btn = document.querySelector(`.filter-btn[data-country="${country}"]`);
                if (btn) {
                    activeCountry = country;
                    btn.classList.add('active');
                }
            }
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', async () => {
            setupFilters();
            activateFilterFromURL();
            await loadCafes();
            if (activeCountry) {
                filterCafes();
            } else {
                renderCafes(allCafes);
            }
        });
    </script>
</body>
</html>
