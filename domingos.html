<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafés abiertos los Domingos | cafes.uy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FAF7F5;
            --bg-card: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #6B6B6B;
            --accent: #C4A484;
            --accent-dark: #8B7355;
            --accent-light: #E8DDD4;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            border-bottom: 1px solid var(--accent-light);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo span {
            color: var(--accent-dark);
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-dark);
        }

        .page-header {
            padding: 3rem 1.5rem 2rem;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .page-header-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }

        .cafes-list {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem 1.5rem 3rem;
        }

        .cafe-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--accent-light);
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }

        .cafe-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .cafe-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .cafe-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .cafe-location {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .hours-badge {
            background: #E3F2FD;
            color: #1565C0;
            padding: 0.375rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .cafe-details {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--accent-light);
        }

        .cafe-detail {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .cafe-detail i {
            color: var(--accent-dark);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        @media (max-width: 640px) {
            .page-header h1 {
                font-size: 1.5rem;
            }

            .cafe-header {
                flex-direction: column;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">cafes<span>.uy</span></a>
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </header>

    <main>
        <section class="page-header">
            <div class="page-header-emoji">📅☕</div>
            <h1>Cafés abiertos los Domingos</h1>
            <p>Cafeterías en Montevideo donde podés ir a tomar algo los domingos.</p>
        </section>

        <section class="cafes-list">
            <!-- Ejemplo de cafe card - descomentar y duplicar para agregar mas -->
            <!--
            <div class="cafe-card">
                <div class="cafe-header">
                    <div>
                        <div class="cafe-name">Nombre del Café</div>
                        <div class="cafe-location">Barrio, Montevideo</div>
                    </div>
                    <span class="hours-badge">9:00 - 18:00</span>
                </div>
                <div class="cafe-details">
                    <div class="cafe-detail">
                        <i class="fas fa-map-marker-alt"></i>
                        Dirección
                    </div>
                    <div class="cafe-detail">
                        <i class="fas fa-coffee"></i>
                        Specialty coffee
                    </div>
                </div>
            </div>
            -->

            <div class="empty-state">
                <div class="empty-state-emoji">🔜</div>
                <p>Pronto vamos a agregar cafeterías abiertas los domingos.</p>
                <p style="margin-top: 0.5rem;">Seguinos en <a href="https://instagram.com/cafes.uy" target="_blank" style="color: var(--accent-dark);">@cafes.uy</a> para enterarte!</p>
            </div>
        </section>
    </main>

    <footer>
        <p>Hecho con ☕ en Uruguay</p>
    </footer>
</body>
</html>
