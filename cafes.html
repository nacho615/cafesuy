<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafeterías | cafes.uy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-card: #1c1c1c;
            --bg-elevated: #262626;
            --text-primary: #ffffff;
            --text-secondary: #a8a8a8;
            --text-muted: #737373;
            --border: #363636;
            --gradient-start: #833ab4;
            --gradient-mid: #fd1d1d;
            --gradient-end: #fcb045;
            --accent: #0095f6;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header estilo IG */
        header {
            padding: 0.875rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-actions a {
            color: var(--text-primary);
            font-size: 1.25rem;
            text-decoration: none;
        }

        /* Stories-like filters */
        .filters-section {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            padding: 0 1rem;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-btn:hover {
            background: var(--bg-elevated);
        }

        .filter-btn.active {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        .filter-btn i {
            font-size: 0.75rem;
        }

        /* Dropdown */
        .dropdown {
            position: relative;
        }

        .dropdown-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dropdown-btn:hover {
            background: var(--bg-elevated);
        }

        .dropdown-btn.active {
            background: linear-gradient(45deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            color: white;
            border-color: transparent;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 180px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            z-index: 10;
            overflow: hidden;
        }

        .dropdown-content.show {
            display: block;
        }

        .dropdown-item {
            padding: 0.875rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: var(--text-primary);
            transition: all 0.15s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: 'Inter', sans-serif;
        }

        .dropdown-item:hover {
            background: var(--bg-elevated);
        }

        .dropdown-item.active {
            background: var(--bg-elevated);
        }

        .dropdown-item.active::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            margin-left: auto;
            color: var(--accent);
        }

        .dropdown-item#descuentos-todos {
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        /* Results count */
        .results-count {
            padding: 1rem 1rem 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Lista de cafés */
        .cafes-list {
            padding: 0.5rem 0 5rem;
        }

        .cafe-card {
            background: var(--bg-primary);
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            cursor: pointer;
        }

        .cafe-card:hover {
            background: var(--bg-secondary);
        }

        .cafe-card:active {
            background: var(--bg-card);
        }

        .cafe-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .cafe-info {
            flex: 1;
            min-width: 0;
        }

        .cafe-name {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .cafe-meta {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            margin-top: 0.375rem;
        }

        .cafe-address {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .cafe-address i {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .cafe-hours {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .cafe-hours i {
            font-size: 0.6875rem;
        }

        .cafe-instagram {
            color: var(--accent);
            font-size: 0.8125rem;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            flex-shrink: 0;
        }

        .cafe-instagram:hover {
            text-decoration: underline;
        }

        .cafe-instagram i {
            font-size: 1rem;
        }

        .cafe-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-top: 0.625rem;
        }

        .tag {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            padding: 0.25rem 0.625rem;
            border-radius: 4px;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .tag.domingos {
            background: rgba(0, 149, 246, 0.15);
            color: #0095f6;
        }

        .tag.descuento-bbva {
            background: rgba(0, 48, 135, 0.2);
            color: #4d88ff;
        }

        .tag.descuento-santander {
            background: rgba(236, 0, 0, 0.15);
            color: #ff4d4d;
        }

        .tag.descuento-itau {
            background: rgba(236, 112, 0, 0.15);
            color: #ff9933;
        }

        .tag.descuento-scotiabank {
            background: rgba(236, 17, 26, 0.15);
            color: #ff4d52;
        }

        .tag.opcion-celiaco,
        .tag.opcion-vegano {
            background: rgba(0, 200, 83, 0.15);
            color: #00c853;
        }

        .tag.pet-friendly {
            background: rgba(156, 39, 176, 0.15);
            color: #ce93d8;
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .no-results-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
            filter: grayscale(1);
        }

        .no-results p {
            font-size: 0.9375rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
        }

        /* Mobile bottom nav (opcional para futuro) */
        @media (max-width: 640px) {
            .cafe-header {
                flex-direction: column;
                gap: 0.625rem;
            }

            .cafe-instagram {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">cafes.uy</a>
        <div class="header-actions">
            <a href="https://instagram.com/cafes.uy" target="_blank" title="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </header>

    <main>
        <section class="filters-section">
            <div class="filters">
                <button class="filter-btn" data-tag="domingos">
                    Domingos
                </button>
                <button class="filter-btn" data-tag="opcion-celiaco">
                    Celíaco
                </button>
                <button class="filter-btn" data-tag="pet-friendly">
                    Pet friendly
                </button>
                <div class="dropdown">
                    <button class="dropdown-btn" id="descuentos-btn">
                        <i class="fas fa-percent"></i> Descuentos
                    </button>
                    <div class="dropdown-content" id="descuentos-dropdown">
                        <button class="dropdown-item" data-tag="todos" id="descuentos-todos">
                            Ver todos
                        </button>
                        <button class="dropdown-item" data-tag="descuento-itau">
                            Itaú
                        </button>
                        <button class="dropdown-item" data-tag="descuento-santander">
                            Santander
                        </button>
                        <button class="dropdown-item" data-tag="descuento-bbva">
                            BBVA
                        </button>
                        <button class="dropdown-item" data-tag="descuento-scotiabank">
                            Scotiabank
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="results-count" id="results-count"></div>

        <section class="cafes-list" id="cafes-list">
            <!-- Cafés se cargan dinámicamente -->
        </section>
    </main>

    <footer>
        <p>Hecho con cafe en Uruguay</p>
    </footer>

    <script>
        let allCafes = [];
        let activeFilters = new Set();
        let activeDiscountFilter = null;

        // Cargar cafés del JSON
        async function loadCafes() {
            try {
                const response = await fetch('cafes.json');
                const data = await response.json();
                allCafes = data.coffee_shops;
                return allCafes;
            } catch (error) {
                console.error('Error cargando cafés:', error);
                document.getElementById('cafes-list').innerHTML = `
                    <div class="no-results">
                        <div class="no-results-emoji">:(</div>
                        <p>Error cargando los cafés</p>
                    </div>
                `;
                return [];
            }
        }

        // Renderizar cafés
        function renderCafes(cafes) {
            const container = document.getElementById('cafes-list');
            const countEl = document.getElementById('results-count');

            if (cafes.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-emoji">:/</div>
                        <p>No encontramos cafés con esos filtros</p>
                    </div>
                `;
                countEl.textContent = '0 resultados';
                return;
            }

            countEl.textContent = `${cafes.length} café${cafes.length !== 1 ? 's' : ''}`;

            container.innerHTML = cafes.map(cafe => `
                <div class="cafe-card" onclick="window.open('https://instagram.com/${cafe.instagram}', '_blank')">
                    <div class="cafe-header">
                        <div class="cafe-info">
                            <div class="cafe-name">${cafe.name}</div>
                            <div class="cafe-meta">
                                ${cafe.address ? `<div class="cafe-address"><i class="fas fa-location-dot"></i> ${cafe.address}</div>` : ''}
                                ${cafe.opening_hours ? `<div class="cafe-hours"><i class="far fa-clock"></i> ${cafe.opening_hours}</div>` : ''}
                            </div>
                        </div>
                        <a href="https://instagram.com/${cafe.instagram}" target="_blank" class="cafe-instagram" onclick="event.stopPropagation()">
                            <i class="fab fa-instagram"></i> @${cafe.instagram}
                        </a>
                    </div>
                    ${cafe.tags.length > 0 ? `
                        <div class="cafe-tags">
                            ${cafe.tags.map(tag => `<span class="tag ${tag}">${formatTag(tag)}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Formatear tag para mostrar
        function formatTag(tag) {
            const tagNames = {
                'domingos': 'Domingos',
                'opcion-celiaco': 'Celíaco',
                'opcion-vegano': 'Vegano',
                'pet-friendly': 'Pet friendly',
                'wifi': 'WiFi',
                'enchufes': 'Enchufes',
                'descuento-bbva': 'BBVA',
                'descuento-santander': 'Santander',
                'descuento-itau': 'Itaú',
                'descuento-scotiabank': 'Scotiabank'
            };
            return tagNames[tag] || tag;
        }

        // Filtrar cafés
        function filterCafes() {
            let filtered = allCafes;

            if (activeFilters.size > 0) {
                filtered = filtered.filter(cafe => {
                    return [...activeFilters].every(filter => cafe.tags.includes(filter));
                });
            }

            if (activeDiscountFilter) {
                filtered = filtered.filter(cafe => cafe.tags.includes(activeDiscountFilter));
            }

            renderCafes(filtered);
        }

        // Setup filtros
        function setupFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tag = btn.dataset.tag;

                    if (activeFilters.has(tag)) {
                        activeFilters.delete(tag);
                        btn.classList.remove('active');
                    } else {
                        activeFilters.add(tag);
                        btn.classList.add('active');
                    }

                    filterCafes();
                });
            });
        }

        // Setup dropdown de descuentos
        function setupDiscountDropdown() {
            const dropdownBtn = document.getElementById('descuentos-btn');
            const dropdown = document.getElementById('descuentos-dropdown');
            const dropdownItems = dropdown.querySelectorAll('.dropdown-item');

            dropdownBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });

            document.addEventListener('click', () => {
                dropdown.classList.remove('show');
            });

            dropdownItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const tag = item.dataset.tag;

                    if (tag === 'todos') {
                        activeDiscountFilter = null;
                        dropdownItems.forEach(i => i.classList.remove('active'));
                        dropdownBtn.classList.remove('active');
                    }
                    else if (activeDiscountFilter === tag) {
                        activeDiscountFilter = null;
                        item.classList.remove('active');
                        dropdownBtn.classList.remove('active');
                    } else {
                        dropdownItems.forEach(i => i.classList.remove('active'));
                        activeDiscountFilter = tag;
                        item.classList.add('active');
                        dropdownBtn.classList.add('active');
                    }

                    dropdown.classList.remove('show');
                    filterCafes();
                });
            });
        }

        // Leer filtro de URL
        function getFilterFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('filter');
        }

        // Activar filtro desde URL
        function activateFilterFromURL() {
            const filter = getFilterFromURL();
            if (filter) {
                if (filter.startsWith('descuento-')) {
                    const item = document.querySelector(`.dropdown-item[data-tag="${filter}"]`);
                    if (item) {
                        activeDiscountFilter = filter;
                        item.classList.add('active');
                        document.getElementById('descuentos-btn').classList.add('active');
                    }
                } else {
                    const btn = document.querySelector(`.filter-btn[data-tag="${filter}"]`);
                    if (btn) {
                        activeFilters.add(filter);
                        btn.classList.add('active');
                    }
                }
            }
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', async () => {
            setupFilters();
            setupDiscountDropdown();
            activateFilterFromURL();
            await loadCafes();
            if (activeFilters.size > 0 || activeDiscountFilter) {
                filterCafes();
            } else {
                renderCafes(allCafes);
            }
        });
    </script>
</body>
</html>
